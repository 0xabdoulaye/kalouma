<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable - Kalouma Market</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <meta name="theme-color" content="#2E7D32">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .logo img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
        }

        .logo span {
            font-size: 1.5rem;
            font-weight: 800;
            color: #212121;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: #2E7D32;
            line-height: 1;
            margin-bottom: 16px;
        }

        h1 {
            color: #212121;
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        p {
            color: #757575;
            font-size: 1rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            margin: 0 6px 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2E7D32, #1B5E20);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #424242;
        }

        .btn-secondary:hover {
            background: #eeeeee;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 24px;
            color: #BDBDBD;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/images/logos/logo-header.png" alt="Kalouma Market">
            <span>Kalouma</span>
        </div>

        <div class="error-code">404</div>
        <h1>Page introuvable</h1>
        <p>La page que vous cherchez n'existe pas ou a ete deplacee.</p>

        <div>
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i> Accueil
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.kalouma.market" class="btn btn-secondary" target="_blank" rel="noopener">
                <i class="fab fa-google-play"></i> Telecharger l'app
            </a>
        </div>

        <div class="footer">
            Kalouma Market - La marketplace de confiance en Guinee
        </div>
    </div>
</body>
</html>
